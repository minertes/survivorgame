# Faz 6.2.3 – Ortam ayrımı (Dev/Staging/Prod)
# Backend ve Analytics bu değerleri okuyabilir; production'da override edilir.
# Örnek: export'ta farklı bir env dosyası kopyalanabilir veya OS environment kullanılır.
# log_level: debug, info, warn, error, fatal — prod'da warn veya error önerilir.

[env]
environment="dev"
backend_url=""
analytics_enabled=true
crash_reporting_enabled=true
log_level="debug"
