# Faz 6.2.1 – CI pipeline: test + (lint) + Godot export
name: Godot CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Godot 4.6
        uses: godotengine/setup-godot@v4
        with:
          godot-version: "4.6"
          godot-arch: "x64"

      - name: Import project (headless)
        run: godot --headless --path . --import --quit-after 2 || true

      - name: Run unit tests
        env:
          GODOT_DISABLE_LEAK_CHECKS: 1
        run: |
          godot --headless --path . res://ci/test_runner.tscn --quit-after 5
          exit $?

      - name: Run integration tests
        env:
          GODOT_DISABLE_LEAK_CHECKS: 1
        run: |
          godot --headless --path . res://ci/integration_test.tscn --quit-after 5
          exit $?

  build-export:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Godot 4.6
        uses: godotengine/setup-godot@v4
        with:
          godot-version: "4.6"
          godot-arch: "x64"

      - name: Import project
        run: godot --headless --path . --import --quit-after 2 || true

      - name: Export PCK (Linux)
        run: |
          if [ -f export_presets.cfg ]; then
            godot --headless --path . --export-release "Linux/X11" || true
          else
            echo "export_presets.cfg yok; editörde preset tanımlayıp commit'leyin veya bu adım atlanıyor."
          fi
